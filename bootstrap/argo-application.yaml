apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-poc-sync
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com<YOUR_GITHUB_USERNAME>/<YOUR_REPO_NAME>.git'
    targetRevision: HEAD
    path: app
  destination:
    server: 'https://default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
